<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Management System - Meisner Studio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <i class="ti ti-lock" style="font-size: 48px; color: var(--color-brand); margin-bottom:16px; display:block;"></i>
    <h2>Admin Login</h2>
    <div class="fg">
      <input type="text" id="l-user" placeholder="Username">
    </div>
    <div class="fg">
      <input type="password" id="l-pass" placeholder="Password">
    </div>
    <div id="login-err" style="color: #ef4444; font-size: 13px; margin-bottom: 12px; display: none; font-weight:500;">Invalid credentials</div>
    <button class="btn primary" style="width: 100%; justify-content: center; padding: 12px; margin-top: 8px;" id="l-btn" onclick="handleLogin()">Sign In</button>
    
    <div style="margin-top: 20px; font-size: 11px; color: var(--color-text-secondary); font-weight: 500; letter-spacing: 0.05em;">
      v1.6.0 Modular
    </div>
  </div>
</div>

<div id="main-app">
  <div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <i class="ti ti-school" style="font-size:22px;color:var(--color-brand)"></i>
      <h1>Course Manager</h1>
    </div>
    <div style="display:flex; flex-direction:column; align-items:flex-end; gap:4px">
      <span class="sync-badge" id="syncBadge"><i class="ti ti-cloud-off"></i> Not connected</span>
      <span class="version-text">v1.6.0 Modular</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="goTab('dashboard')"><i class="ti ti-layout-dashboard"></i> Overview</button>
    <button class="tab" onclick="goTab('courses')"><i class="ti ti-books"></i> Courses</button>
    <button class="tab" onclick="goTab('students')"><i class="ti ti-users"></i> Students</button>
    <button class="tab" onclick="goTab('payments')"><i class="ti ti-coin"></i> Payments</button>
  </div>

  <div class="panel">
  <div class="sec active" id="sec-dashboard">
    <div class="stats-grid" id="statsGrid">
      <div class="stat"><div class="lbl">Courses</div><div class="val b" id="st-courses">0</div></div>
      <div class="stat"><div class="lbl">Students</div><div class="val g" id="st-students">0</div></div>
      <div class="stat"><div class="lbl">Total Collected</div><div class="val g" id="st-collected">€0</div></div>
      <div class="stat"><div class="lbl">Outstanding</div><div class="val a" id="st-outstanding">€0</div></div>
    </div>
    <div id="dashContent"></div>
  </div>

  <div class="sec" id="sec-courses">
    <div class="section-hd"><h3>All Courses</h3><button class="btn primary" onclick="openM('mCourse')"><i class="ti ti-plus"></i> New Course</button></div>
    <div id="courseList"></div>
  </div>

  <div class="sec" id="sec-students">
    <div class="section-hd"><h3>All Students</h3><button class="btn primary" onclick="openM('mStudent')"><i class="ti ti-user-plus"></i> Enroll Student</button></div>
    <div id="studentList"></div>
  </div>

  <div class="sec" id="sec-payments">
    <div class="section-hd"><h3>Payment Log</h3><button class="btn primary" onclick="openM('mPayment')"><i class="ti ti-plus"></i> Record Payment</button></div>
    <div id="paymentList"></div>
  </div>
  </div>
  </div>
</div>

<div class="modal-wrap" id="mCourse"><div class="modal">
  <h2 id="modal-title-course"><i class="ti ti-books"></i> New Course</h2>
  <div class="fg"><label>Course name *</label><input type="text" id="c-name" placeholder="e.g. Intensive English"></div>
  <div class="form-2col">
    <div class="fg"><label>Start date</label><input type="date" id="c-start"></div>
    <div class="fg"><label>End date</label><input type="date" id="c-end"></div>
  </div>
  <div class="form-2col">
    <div class="fg"><label>Normal Fee (€) *</label><input type="number" id="c-feeNormal"></div>
    <div class="fg"><label>Early Bird Fee (€) *</label><input type="number" id="c-feeEarly"></div>
  </div>
  <div class="form-2col">
    <div class="fg"><label>Deposit amount (€)</label><input type="number" id="c-deposit"></div>
    <div class="fg"><label>Capacity</label><input type="number" id="c-capacity"></div>
  </div>
  <div class="modal-footer"><button class="btn" onclick="closeM('mCourse')">Cancel</button><button class="btn primary" id="btn-save-course" onclick="saveCourse()">Create Course</button></div>
</div></div>

<div class="modal-wrap" id="mStudent"><div class="modal">
  <h2 id="modal-title-student"><i class="ti ti-user-plus"></i> Enroll Student</h2>
  <div class="fg"><label>Course *</label><select id="s-course" onchange="updateInstalments()"></select></div>
  <div class="fg"><label>Full name *</label><input type="text" id="s-fullname" placeholder="Jane Doe"></div>
  <div class="form-2col">
    <div class="fg"><label>Email *</label><input type="email" id="s-email"></div>
    <div class="fg"><label>Phone</label><input type="text" id="s-phone"></div>
  </div>
  <hr class="divider">
  <div style="font-size:14px;font-weight:600;margin-bottom:12px;color:#111827">Payment Details</div>
  <div class="form-2col">
    <div class="fg"><label>Price Tier *</label><select id="s-priceType" onchange="updateInstalments()"><option value="normal">Normal Price</option><option value="early_bird">Early Bird Price</option></select></div>
    <div class="fg"><label>Total Course Fee</label><input type="text" id="s-displayTotal" disabled style="background:#f3f4f6; font-weight:600; color:var(--color-brand)"></div>
  </div>
  <div class="form-2col">
    <div class="fg"><label>Deposit Amount (€)</label><input type="number" id="s-depositAmount" oninput="updateInstalments()"></div>
    <div class="fg"><label>Deposit Due Date</label><input type="date" id="s-depositDate"></div>
  </div>
  <div class="fg"><label>Remaining Payment Plan *</label><select id="s-payType" onchange="toggleInstalmentFields()"><option value="full_remaining">Full Remaining</option><option value="instalment">Instalment Plan</option></select></div>
  <div id="instalment-container" style="display:none; background:var(--color-background-secondary); padding:16px; border-radius:8px; border:1px solid var(--color-border-secondary);">
    <div class="fg"><label>Number of Instalments</label><input type="number" id="s-numInstalments" min="1" max="24" oninput="updateInstalments()"></div>
    <div id="dynamic-instalments"></div>
  </div>
  <div class="modal-footer"><button class="btn" onclick="closeM('mStudent')">Cancel</button><button class="btn primary" id="btn-save-student" onclick="saveStudent()">Enroll Student</button></div>
</div></div>

<div class="modal-wrap" id="mPayment"><div class="modal">
  <h2><i class="ti ti-coin"></i> Record Payment</h2>
  <div class="fg"><label>Student *</label><select id="p-student" onchange="calculatePaymentSuggestion()"></select></div>
  <div id="smart-suggestion" class="smart-suggestion"><div class="s-title" id="ss-title"></div><div class="s-desc" id="ss-desc"></div></div>
  <div class="form-2col">
    <div class="fg"><label>Amount (€) *</label><input type="number" id="p-amount"></div>
    <div class="fg"><label>Date *</label><input type="date" id="p-date"></div>
  </div>
  <div class="fg"><label>Payment Type</label><select id="p-type"><option value="deposit">Deposit</option><option value="instalment">Instalment</option><option value="full">Full payment</option><option value="other">Other</option></select></div>
  <div class="fg"><label>Note (optional)</label><input type="text" id="p-note"></div>
  <div class="modal-footer"><button class="btn" onclick="closeM('mPayment')">Cancel</button><button class="btn primary" onclick="savePayment()">Save Payment</button></div>
</div></div>

<div class="modal-wrap" id="mStudentDetail"><div class="modal">
  <h2 id="sd-title"><i class="ti ti-user"></i> Student Detail</h2>
  <div id="sd-body"></div>
  <div class="modal-footer" id="sd-footer"></div>
</div></div>

</body>
</html>
