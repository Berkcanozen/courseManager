<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Management System - v2.3.0</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <i class="ti ti-lock" style="font-size: 48px; color: var(--color-brand); margin-bottom:16px; display:block;"></i>
    <h2>Admin Login</h2>
    <div class="fg"><input type="text" id="l-user" placeholder="Username"></div>
    <div class="fg"><input type="password" id="l-pass" placeholder="Password"></div>
    <div id="login-err" style="color: #ef4444; font-size: 13px; margin-bottom: 12px; display: none;">Invalid credentials.</div>
    <button class="btn primary" style="width: 100%; justify-content: center; padding: 12px;" id="l-btn" onclick="handleLogin()">Sign In</button>
    <div style="margin-top: 24px; text-align: center;">
      <span style="font-size: 11px; color: var(--color-text-secondary);">v2.3.0 Advanced</span>
      <div id="loginSyncBadge" class="sync-badge" style="margin-top:8px;"><i class="ti ti-loader"></i> Syncing...</div>
    </div>
  </div>
</div>

<div id="main-app" style="display:none;">
  <div class="app">
    <div class="topbar">
      <div class="topbar-left"><i class="ti ti-school" style="font-size:22px;color:var(--color-brand)"></i><h1>Course Manager</h1></div>
      <span class="sync-badge" id="syncBadge">Connecting...</span>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="goTab('dashboard')">Overview</button>
      <button class="tab" onclick="goTab('courses')">Courses</button>
      <button class="tab" onclick="goTab('students')">Student DB</button>
      <button class="tab" onclick="goTab('enrollments')">Enrollments</button>
      <button class="tab" onclick="goTab('payments')">Payments</button>
    </div>

    <div class="panel">
      <div class="sec active" id="sec-dashboard">
        <div class="stats-grid">
          <div class="stat"><div class="lbl">Courses</div><div class="val b" id="st-courses">0</div></div>
          <div class="stat"><div class="lbl">Students</div><div class="val b" id="st-students">0</div></div>
          <div class="stat"><div class="lbl">Collected</div><div class="val g" id="st-collected">€0</div></div>
          <div class="stat"><div class="lbl">Outstanding</div><div class="val a" id="st-outstanding">€0</div></div>
        </div>
        <div id="dashContent"></div>
      </div>

      <div class="sec" id="sec-courses">
        <div class="section-hd"><h3>All Courses</h3><button class="btn primary" onclick="openM('mCourse')">New Course</button></div>
        <div id="courseList"></div>
      </div>

      <div class="sec" id="sec-students">
        <div class="section-hd"><h3>Student Database</h3><input type="text" id="s-search" placeholder="Search students..." onkeyup="renderStudents()"></div>
        <div id="studentDBList"></div>
      </div>

      <div class="sec" id="sec-enrollments">
        <div class="section-hd"><h3>Course Enrollments</h3><button class="btn primary" onclick="openM('mEnrollment')">Enroll Student</button></div>
        <div id="enrollmentList"></div>
      </div>

      <div class="sec" id="sec-payments">
        <div class="section-hd"><h3>Payment Log</h3><button class="btn primary" onclick="openM('mPayment')">Record Payment</button></div>
        <div id="paymentList"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-wrap" id="mCourse"><div class="modal">
  <h2 id="modal-title-course">Course Details</h2>
  <div class="fg"><label>Course name *</label><input type="text" id="c-name"></div>
  <div class="form-2col">
    <div class="fg"><label>Start date</label><input type="date" id="c-start"></div>
    <div class="fg"><label>End date</label><input type="date" id="c-end"></div>
  </div>
  <div class="form-2col">
    <div class="fg"><label>Normal Fee (€)</label><input type="number" id="c-feeNormal"></div>
    <div class="fg"><label>Status *</label><select id="c-status"></select></div>
  </div>
  <div class="form-2col">
    <div class="fg"><label>Early Bird (€)</label><input type="number" id="c-feeEarly"></div>
    <div class="fg"><label>Capacity</label><input type="number" id="c-capacity"></div>
  </div>
  <div class="modal-footer"><button class="btn" onclick="closeM('mCourse')">Cancel</button><button class="btn primary" id="btn-save-course" onclick="saveCourse()">Save</button></div>
</div></div>

<div class="modal-wrap" id="mEnrollment"><div class="modal">
  <h2>Enroll Student</h2>
  <div class="fg"><label>Course *</label><select id="e-course" onchange="updateInstalments()"></select></div>
  <div class="fg">
    <label>Student Type</label>
    <div style="display:flex; gap:16px;">
      <label><input type="radio" name="eType" value="existing" onchange="toggleStudentMode()" checked> Existing</label>
      <label><input type="radio" name="eType" value="new" onchange="toggleStudentMode()"> New</label>
    </div>
  </div>

  <div id="e-existing-box" class="fg">
    <label>Search Existing Student *</label>
    <input type="text" id="e-search-input" list="student-datalist" placeholder="Type name to search..." onchange="captureSelectedStudent()">
    <datalist id="student-datalist"></datalist>
    <input type="hidden" id="e-selected-student-id">
  </div>

  <div id="e-new-box" style="display:none;">
    <div class="fg"><label>Full name *</label><input type="text" id="e-fullname"></div>
    <div class="form-2col">
      <div class="fg"><label>Email *</label><input type="email" id="e-email"></div>
      <div class="fg"><label>Phone</label><input type="text" id="e-phone"></div>
    </div>
  </div>

  <hr class="divider">
  <div class="form-2col">
    <div class="fg"><label>Price Tier</label><select id="e-priceType" onchange="updateInstalments()"><option value="normal">Normal</option><option value="early_bird">Early Bird</option></select></div>
    <div class="fg"><label>Total Fee</label><input type="text" id="e-displayTotal" disabled></div>
  </div>
  <div class="form-2col">
    <div class="fg"><label>Deposit (€)</label><input type="number" id="e-depositAmount" oninput="updateInstalments()"></div>
    <div class="fg"><label>Deposit Date</label><input type="date" id="e-depositDate"></div>
  </div>
  <div class="fg"><label>Payment Plan</label><select id="e-payType" onchange="toggleInstalmentFields()"><option value="full_remaining">Full</option><option value="instalment">Instalment</option></select></div>
  <div id="instalment-container" style="display:none; background:#f3f4f6; padding:12px; border-radius:8px;">
    <div class="fg"><label>Instalments</label><input type="number" id="e-numInstalments" oninput="updateInstalments()"></div>
    <div id="dynamic-instalments"></div>
  </div>
  <div class="modal-footer"><button class="btn" onclick="closeM('mEnrollment')">Cancel</button><button class="btn primary" id="btn-save-enrollment" onclick="saveEnrollment()">Enroll</button></div>
</div></div>

</body>
</html>
