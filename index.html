<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Management System - Meisner Studio</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <i class="ti ti-lock" style="font-size: 48px; color: var(--color-brand); margin-bottom:16px; display:block;"></i>
    <h2>Admin Login</h2>
    <div class="fg">
      <input type="text" id="l-user" placeholder="Username">
    </div>
    <div class="fg">
      <input type="password" id="l-pass" placeholder="Password">
    </div>
    <div id="login-err" style="color: #ef4444; font-size: 13px; margin-bottom: 12px; display: none; font-weight:500;">Invalid credentials</div>
    <button class="btn primary" style="width: 100%; justify-content: center; padding: 12px; margin-top: 8px;" id="l-btn" onclick="handleLogin()">Sign In</button>
  </div>
</div>

<div id="main-app">
  <div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <i class="ti ti-school" style="font-size:22px;color:var(--color-brand)" aria-hidden="true"></i>
      <h1>Course Manager</h1>
    </div>
    <div style="display:flex; flex-direction:column; align-items:flex-end; gap:4px">
      <span class="sync-badge" id="syncBadge"><i class="ti ti-cloud-off"></i> Not connected</span>
      <span style="font-size: 10px; color: var(--color-text-secondary); font-weight: 500;">v1.5.0 Modular</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="goTab('dashboard')"><i class="ti ti-layout-dashboard"></i> Overview</button>
    <button class="tab" onclick="goTab('courses')"><i class="ti ti-books"></i> Courses</button>
    <button class="tab" onclick="goTab('students')"><i class="ti ti-users"></i> Students</button>
    <button class="tab" onclick="goTab('payments')"><i class="ti ti-coin"></i> Payments</button>
  </div>

  <div class="panel">
  <div class="sec active" id="sec-dashboard">
    <div class="stats-grid" id="statsGrid">
      <div class="stat"><div class="lbl">Courses</div><div class="val b" id="st-courses">0</div></div>
      <div class="stat"><div class="lbl">Students</div><div class="val g" id="st-students">0</div></div>
      <div class="stat"><div class="lbl">Total Collected</div><div class="val g" id="st-collected">€0</div></div>
      <div class="stat"><div class="lbl">Outstanding</div><div class="val a" id="st-outstanding">€0</div></div>
    </div>
    <div id="dashContent"></div>
  </div>

  <div class="sec" id="sec-courses">
    <div style="display:flex; justify-content:space-between; margin-bottom:16px;">
      <h3>All Courses</h3><button class="btn primary" onclick="openM('mCourse')"><i class="ti ti-plus"></i> New Course</button>
    </div>
    <div id="courseList"></div>
  </div>

  <div class="sec" id="sec-students">
    <div style="display:flex; justify-content:space-between; margin-bottom:16px;">
      <h3>Enrolled Students</h3><button class="btn primary" onclick="openM('mStudent')"><i class="ti ti-user-plus"></i> Enroll Student</button>
    </div>
    <div id="studentList"></div>
  </div>

  <div class="sec" id="sec-payments">
    <div style="display:flex; justify-content:space-between; margin-bottom:16px;">
      <h3>Payment Log</h3><button class="btn primary" onclick="openM('mPayment')"><i class="ti ti-plus"></i> Record Payment</button>
    </div>
    <div id="paymentList"></div>
  </div>
  </div>
  </div>
</div>

<div class="modal-wrap" id="mCourse"><div class="modal">
  <h2 id="mc-title">New Course</h2>
  <div class="fg"><label>Course name *</label><input type="text" id="c-name"></div>
  <div class="form-2col">
    <div class="fg"><label>Start date</label><input type="date" id="c-start"></div>
    <div class="fg"><label>End date</label><input type="date" id="c-end"></div>
  </div>
  <div class="form-2col">
    <div class="fg"><label>Normal Fee (€)</label><input type="number" id="c-feeN"></div>
    <div class="fg"><label>Early Bird Fee (€)</label><input type="number" id="c-feeE"></div>
  </div>
  <div class="modal-footer"><button class="btn" onclick="closeM('mCourse')">Cancel</button><button class="btn primary" onclick="saveCourse()">Save</button></div>
</div></div>

<div class="modal-wrap" id="mStudent"><div class="modal">
  <h2 id="ms-title">Enroll Student</h2>
  <div class="fg"><label>Course *</label><select id="s-course" onchange="updateSForm()"></select></div>
  <div class="fg"><label>Full Name *</label><input type="text" id="s-fullname"></div>
  <div class="form-2col">
    <div class="fg"><label>Email *</label><input type="email" id="s-mail"></div>
    <div class="fg"><label>Phone</label><input type="text" id="s-phone"></div>
  </div>
  <div class="form-2col">
    <div class="fg"><label>Price Tier</label><select id="s-tier" onchange="updateSForm()"><option value="normal">Normal</option><option value="early_bird">Early Bird</option></select></div>
    <div class="fg"><label>Total Fee</label><input type="text" id="s-total" disabled style="background:#f3f4f6; font-weight:600;"></div>
  </div>
  <div class="form-2col">
    <div class="fg"><label>Deposit (€)</label><input type="number" id="s-depA"></div>
    <div class="fg"><label>Deposit Date</label><input type="date" id="s-depD"></div>
  </div>
  <div class="fg"><label>Plan</label><select id="s-plan" onchange="toggleInst()"><option value="full">Full Remaining</option><option value="instalment">Instalment Plan</option></select></div>
  <div id="inst-box" style="display:none; background:#f9fafb; padding:15px; border-radius:10px; border:1px solid #eee;">
    <div class="fg"><label>Instalments</label><input type="number" id="s-instN" min="1"></div>
  </div>
  <div class="modal-footer"><button class="btn" onclick="closeM('mStudent')">Cancel</button><button class="btn primary" onclick="saveStudent()">Save</button></div>
</div></div>

<div class="modal-wrap" id="mPayment"><div class="modal">
  <h2>Record Payment</h2>
  <div class="fg"><label>Student *</label><select id="p-student" onchange="suggestPay()"></select></div>
  <div id="p-sugg" class="smart-suggestion"></div>
  <div class="form-2col">
    <div class="fg"><label>Amount (€)</label><input type="number" id="p-amt"></div>
    <div class="fg"><label>Date</label><input type="date" id="p-date"></div>
  </div>
  <div class="fg"><label>Type</label><select id="p-type"><option value="deposit">Deposit</option><option value="instalment">Instalment</option><option value="full">Full Payment</option></select></div>
  <div class="modal-footer"><button class="btn" onclick="closeM('mPayment')">Cancel</button><button class="btn primary" onclick="savePayment()">Record</button></div>
</div></div>

<div class="modal-wrap" id="mStudentDetail"><div class="modal">
  <h2 id="sd-title">Detail</h2>
  <div id="sd-body"></div>
  <div class="modal-footer" id="sd-footer"></div>
</div></div>

</body>
</html>
